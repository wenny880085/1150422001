<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wenny Hsieh</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #f5f1ed 0%, #e8dfd7 100%);
        color: #6b5d52;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 800px;
        margin: 60px auto;
        padding: 24px;
        background: #faf8f4;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(139, 115, 85, 0.12);
        border-left: 5px solid #c9a961;
      }
      h1 {
        margin-top: 0;
        color: #8b7355;
      }
      .subtitle {
        color: #a08875;
        font-size: 18px;
        margin: 12px 0 20px 0;
      }
      p {
        line-height: 1.75;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>你好，我是 Wenny Hsieh</h1>
      <div class="subtitle">護理師 | 精神科病房專家</div>
      <p>
        我是一位擁有 10 年精神科病房經驗的護理師，目前就職於敦仁醫院。
        在這十年的臨床工作中，我致力於為患者提供細心、專業的護理照護。
      </p>
      <p>
        我相信每位患者都值得被尊重與理解。無論在最具挑戰的時刻，
        我都努力運用耐心與同理心，陪伴患者走過復原之路。
        我的工作經驗教會我如何在高壓環境中保持穩定，同時關注患者的身心健康。
      </p>
    </div>
  </body>
</html>
